name: Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18   # safer than 20

    - name: Install dependencies
      run: npm ci
      working-directory: edsforms

    - name: Run lint
      run: npm run lint
      working-directory: edsforms